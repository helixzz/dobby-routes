name: Update Route Tables

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate route tables
        run: |
          PYTHONPATH=src python -m dobby_routes.cli --output-dir /tmp/dobby-output

      - name: Check out data branch
        run: |
          git fetch origin data || true
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

      - name: Copy output files
        run: |
          cp -f /tmp/dobby-output/cn_routes_annotated.txt .
          cp -f /tmp/dobby-output/cn_routes.txt .
          cp -f /tmp/dobby-output/cn_routes_inverse.txt .

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cn_routes_annotated.txt cn_routes.txt cn_routes_inverse.txt
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            ROUTES=$(grep -c '^[^#]' cn_routes.txt || true)
            INVERSE=$(grep -c '^[^#]' cn_routes_inverse.txt || true)
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: update route tables ${DATE}" \
              -m "Forward routes: ${ROUTES}" \
              -m "Inverse routes: ${INVERSE}"
            git push origin data
            echo "Route tables updated and pushed."
          fi
